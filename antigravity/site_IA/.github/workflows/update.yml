name: Agrégation d'Actualités IA

on:
  schedule:
    - cron: '0 */6 * * *' # Toutes les 6 heures
  workflow_dispatch: # Permet de lancer manuellement

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Script de Synchronisation
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: npx tsx scripts/sync.ts

    - name: Commit modifications (SQLite DB)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add dev.db
        git diff-index --quiet HEAD || git commit -m "chore: MAJ de la base de donnees via Sync"
        git push
